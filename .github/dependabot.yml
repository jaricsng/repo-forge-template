version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Prefix must be a valid Conventional Commit type: the governance
    # workflow enforces PR titles, and that check is a required status check.
    commit-message:
      prefix: "chore"
    groups:
      go-dependencies:
        patterns:
          - "*"

  # GitHub Actions. Dependabot updates the pinned commit SHAs (and their
  # trailing version comments), so pinning stays maintainable.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
    # Group all action bumps into one PR. Without this, multi-path actions
    # like github/codeql-action (init/autobuild/analyze) open a PR per path,
    # which cannot be merged individually — CodeQL requires matching versions.
    groups:
      github-actions:
        patterns:
          - "*"

  # Base image in the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
