run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - gosec
    - bodyclose
    - noctx
    - unconvert
    - unparam

linters-settings:
  gosec:
    excludes:
      - G104 # duplicate of errcheck
  revive:
    rules:
      - name: exported
        disabled: false

issues:
  exclude-dirs:
    - test/e2e # e2e tests exercise real processes; some checks don't apply
  max-issues-per-linter: 0
  max-same-issues: 0
